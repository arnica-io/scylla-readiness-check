name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      # The scylladb subchart is vendored as a .tgz in charts/, so no
      # external repo access is needed for lint/template.
      - name: Helm lint
        run: helm lint .

      - name: Helm template (catch template errors)
        run: helm template rc . > /dev/null

  # kind-smoke is best-effort: pulling the bitnamilegacy/scylladb image and
  # ScyllaDB's resource requirements may exceed what a small GitHub-hosted
  # runner can provide. If this job proves flaky, add `continue-on-error: true`
  # to make it non-blocking rather than deleting it.
  kind-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-template
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      # kind ships with a local-path (standard) StorageClass by default,
      # which satisfies the chart's block-storage requirement.
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: chart-ci

      # Build the validator image and load it into the kind node, so the test
      # Job can run it without a published GHCR image (imagePullPolicy: Never).
      - name: Build validator image
        run: docker build -t scylla-readiness-validator:ci validator/

      - name: Load validator image into kind
        run: kind load docker-image scylla-readiness-validator:ci --name chart-ci

      # Single-node developer-mode overlay so ScyllaDB fits a small runner.
      - name: Install chart
        run: |
          helm install rc . \
            -n scylla-readiness \
            --create-namespace \
            -f test/ci-values.yaml

      # Do NOT swallow the exit code: if the validator fails, the job must
      # fail so we see the result. --timeout MUST exceed validator.timeoutSeconds
      # (420s in ci-values), or `helm test` aborts while the Job is still running.
      - name: Run readiness test
        run: helm test rc -n scylla-readiness --logs --timeout 12m

      - name: Show pods
        if: always()
        run: kubectl get pods -A

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl describe pods -n scylla-readiness || true
          kubectl get events -n scylla-readiness --sort-by=.lastTimestamp || true
          for pod in $(kubectl get pods -n scylla-readiness -o name); do
            echo "===== Logs: ${pod} ====="
            kubectl logs -n scylla-readiness "${pod}" --all-containers --tail=200 || true
          done
