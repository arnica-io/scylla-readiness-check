name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io (docker)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push validator image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: validator
          file: validator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/arnica-io/scylla-readiness-validator:${{ steps.version.outputs.version }}
            ghcr.io/arnica-io/scylla-readiness-validator:latest

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to ghcr.io (helm)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io \
            --username "$GHCR_USER" \
            --password-stdin

      - name: Pin validator image tag to this release
        run: |
          sed -i -E "s#(scylla-readiness-validator):[0-9A-Za-z._-]+#\1:${VERSION}#" values.yaml
          grep -n "scylla-readiness-validator:" values.yaml

      - name: Package chart
        run: helm package . --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart to OCI registry
        run: helm push "scylla-readiness-check-${VERSION}.tgz" oci://ghcr.io/arnica-io
