name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io (docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push validator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: validator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/arnica-io/scylla-readiness-validator:${{ steps.version.outputs.version }}
            ghcr.io/arnica-io/scylla-readiness-validator:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to ghcr.io (helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        run: helm package . --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart to OCI registry
        run: helm push "scylla-readiness-check-${VERSION}.tgz" oci://ghcr.io/arnica-io
