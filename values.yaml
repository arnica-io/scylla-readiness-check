# -----------------------------------------------------------------------------
# scylla-readiness-check — preflight / readiness POC chart
#
# This chart deploys a 3-node ScyllaDB cluster (Bitnami subchart) with the
# Alternator (DynamoDB-compatible) API enabled, plus a `helm test` validator
# Job that proves the cluster can run it. Three nodes give replication
# factor 3, so the validator exercises real QUORUM reads/writes (not a
# single-node RF=1 shortcut). Still a POC sizing — not a tuned production
# topology.
#
# IMPORTANT: ScyllaDB does NOT support NFS-backed storage. Make sure the
# storage class used below (cluster default when empty) provisions block
# storage (e.g. local SSD, EBS, Ceph RBD, Longhorn), not NFS.
# -----------------------------------------------------------------------------

scylladb:
  enabled: true
  # Deterministic service DNS: service name "scylladb", Alternator at
  # http://scylladb:8000 — the validator Job depends on this.
  fullnameOverride: scylladb
  replicaCount: 3                 # 3 nodes -> RF3 -> real QUORUM (matches prod)
  # Matches kube-arnica-stack. Smaller presets starve ScyllaDB's seastar
  # engine (insufficient memory) and it fails to boot — do not shrink below
  # "medium" without also tuning --memory/--smp/--reserve-memory.
  resourcesPreset: "medium"
  image:
    repository: bitnamilegacy/scylladb
    # Verbose Bitnami startup logging, on by default for this POC so that a
    # failed ScyllaDB boot is visible in `kubectl logs` and the validator's
    # diagnostics packet. Set to false for quieter output.
    debug: true
  persistence:
    # IMPORTANT: ScyllaDB requires high-performance BLOCK storage. NFS is NOT
    # supported and will cause failures/poor performance.
    #   ""  -> cluster default storage class (recommended for the POC)
    #   "-" -> storageClassName: "" (disables dynamic provisioning)
    # On-prem block options: longhorn, rook-ceph-block, local-path,
    # openebs-cstor, or a direct-attached class. Override with
    #   --set scylladb.persistence.storageClass=<your-block-sc>
    storageClass: ""
    size: 30Gi
  sysctl:
    enabled: true
    image:
      repository: bitnamilegacy/os-shell
  networkPolicy:
    enabled: false
  dbUser:
    user: arnica
    forcePassword: false
    password: arnica
  extraContainerPorts:
    - containerPort: 8000
      name: alternator
  service:
    extraPorts:
      - name: alternator
        port: 8000
        nodePort: null
  cluster:
    seedCount: 1
  # ScyllaDB/seastar creates one shard per CPU core it SEES — which is the
  # node's core count, not the pod's CPU limit. On a high-core node (e.g. 36
  # cores) it spawns 36 shards and splits the pod's memory across them, giving
  # each shard too little and failing at startup with:
  #   Startup failed: logalloc::bad_alloc (failed to allocate segment ...)
  # Pinning --smp caps the shard count so the DB boots regardless of node size.
  # This is a portability choice for the POC (compat, not perf); prospects can
  # raise --smp for a performance test if the pod is given more CPU/memory.
  command:
    - bash
    - -ec
    - |
      if [[ $POD_NAME =~ (.*)-0$ ]]; then
          echo "Setting node as password seeder"
          export SCYLLADB_PASSWORD_SEEDER=yes
      else
          export SCYLLADB_IGNORE_INITDB_SCRIPTS=1
      fi
      export SCYLLADB_BROADCAST_ADDRESS=${POD_NAME}-internal
      /opt/bitnami/scripts/scylladb/entrypoint.sh /opt/bitnami/scripts/scylladb/run.sh --alternator-port=8000 --alternator-write-isolation=always --smp=1 --overprovisioned --reserve-memory=0M
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: scylladb
            topologyKey: kubernetes.io/hostname
          weight: 1

# Validator Job run by `helm test` — exercises the Alternator API end to end.
validator:
  # Tag is kept in lockstep with the chart release by the release workflow.
  image: ghcr.io/arnica-io/scylla-readiness-validator:0.1.3
  imagePullPolicy: IfNotPresent
  # How long the validator waits for the FULL cluster to be Ready before the
  # checks run. ScyllaDB nodes start one at a time (StatefulSet) and each can
  # take ~6-8 min on first boot, so a 3-node cluster needs ~18-24 min. Default
  # 40 min leaves headroom; raise it for slow storage or more nodes.
  timeoutSeconds: 2400
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
