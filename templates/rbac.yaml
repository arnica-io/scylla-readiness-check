apiVersion: v1
kind: ServiceAccount
metadata:
  name: scylla-readiness-validator
  labels:
    {{- include "scylla-readiness-check.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scylla-readiness-validator
  labels:
    {{- include "scylla-readiness-check.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list"]
  # exec is used ONLY by the validator, and ONLY on timeout, to read
  # ScyllaDB's boot log (scylladb_first_boot.log) which Bitnami writes to a
  # file rather than stdout. This grant is namespaced to the release and is
  # removed by `helm uninstall` — it exists only for the testing period.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scylla-readiness-validator
  labels:
    {{- include "scylla-readiness-check.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scylla-readiness-validator
subjects:
  - kind: ServiceAccount
    name: scylla-readiness-validator
    namespace: {{ .Release.Namespace }}
